name: CI Tests and Coverage

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

jobs:
  tests:
    name: Tests and Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      PACKAGES_USER: ${{ secrets.HAUNTEDMC_PACKAGES_USERNAME }}
      PACKAGES_TOKEN: ${{ secrets.HAUNTEDMC_PACKAGES_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate package token
        run: |
          if [ -z "$PACKAGES_USER" ]; then
            echo "Missing secret HAUNTEDMC_PACKAGES_USERNAME." >&2
            exit 1
          fi
          if [ -z "$PACKAGES_TOKEN" ]; then
            echo "Missing secret HAUNTEDMC_PACKAGES_TOKEN (requires read:packages)." >&2
            exit 1
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          server-id: github
          server-username: PACKAGES_USER
          server-password: PACKAGES_TOKEN

      - name: Run Maven Verify
        shell: bash
        run: |
          set -o pipefail
          mkdir -p target/ci
          mvn -U -B -ntp verify 2>&1 | tee target/ci/maven-verify.log

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-diagnostics
          path: target/ci

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco
